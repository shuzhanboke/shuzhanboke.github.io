backend:
  name: github
  repo: shuzhanboke/shuzhanboke.github.io
  branch: main
  base_url: https://blog.shuzhan.one

# 媒体文件（图片上传）
media_folder: "img/uploads"
public_folder: "/img/uploads"

# 站点URL
site_url: https://blog.shuzhan.one
display_url: https://blog.shuzhan.one
logo_url: https://blog.shuzhan.one/img/fluid.png

# 语言设置
locale: "zh_Hans"

# 文章集合
collections:
  - name: "posts"
    label: "博客文章"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }
      - { label: "更新日期", name: "updated", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss", required: false }
      - { label: "分类", name: "categories", widget: "list", default: ["技术分享"] }
      - { label: "标签", name: "tags", widget: "list" }
      - { label: "封面图片", name: "index_img", widget: "image", required: false }
      - { label: "文章摘要", name: "excerpt", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "pages"
    label: "页面"
    files:
      - label: "关于页面"
        name: "about"
        file: "_pages/about.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "正文", name: "body", widget: "markdown" }
